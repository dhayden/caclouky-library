name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Build React ────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/caclouky-react/package-lock.json

      - name: Install React dependencies
        working-directory: web/caclouky-react
        run: npm ci

      - name: Build React (production)
        working-directory: web/caclouky-react
        run: npm run build
        env:
          VITE_API_URL: /api

      # ── Build Expo web (mobile) ────────────────────────────────────────────
      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install

      - name: Build Expo web
        working-directory: mobile
        run: npx expo export --platform web

      # ── Copy React dist into API wwwroot ───────────────────────────────────
      - name: Copy React dist to API wwwroot
        run: |
          mkdir -p api/wwwroot
          cp -r web/caclouky-react/dist/. api/wwwroot/
          mkdir -p api/wwwroot/mobile
          cp -r mobile/dist/. api/wwwroot/mobile/

      # ── Build & Publish .NET API ───────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish API (linux-x64)
        working-directory: api
        run: dotnet publish -c Release -r linux-x64 --self-contained false -o ../publish

      # ── Deploy to server ───────────────────────────────────────────────────
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 212.56.44.143 >> ~/.ssh/known_hosts

      - name: Check nginx write access and root ssh
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 dhayden@212.56.44.143 "
            echo '--- nginx dir perms ---'
            ls -la /etc/nginx/ 2>/dev/null || echo no-nginx
            ls -la /etc/nginx/conf.d/ 2>/dev/null || echo no-conf-d
            ls -la /etc/nginx/sites-available/ 2>/dev/null || echo no-sites-avail
            echo '--- writable test ---'
            touch /etc/nginx/conf.d/test 2>/dev/null && echo WRITABLE && rm /etc/nginx/conf.d/test || echo NOT-WRITABLE
            echo '--- what is on port 80 ---'
            ss -tlnp | grep ':80'
            echo '--- nginx user ---'
            ps aux | grep nginx | grep -v grep
          "
          echo '--- try root ssh ---'
          ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@212.56.44.143 "id; ss -tlnp | grep :80" 2>&1 || echo 'root-ssh-failed'

      - name: Stop running app
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 dhayden@212.56.44.143 \
            "if [ -f ~/caclouky/app.pid ]; then kill \$(cat ~/caclouky/app.pid) 2>/dev/null || true; rm ~/caclouky/app.pid; fi; echo stopped"

      - name: Copy files to server
        run: |
          chmod -R 755 publish/
          tar -czf deploy.tar.gz -C publish .
          scp -i ~/.ssh/deploy_key -P 2222 deploy.tar.gz dhayden@212.56.44.143:/home/dhayden/deploy.tar.gz
          ssh -i ~/.ssh/deploy_key -p 2222 dhayden@212.56.44.143 \
            "find ~/caclouky -mindepth 1 -maxdepth 1 ! -name sermon-pdfs ! -name 'caclouky.db*' -exec rm -rf {} + && tar -xzf ~/deploy.tar.gz --no-same-permissions -C ~/caclouky && rm ~/deploy.tar.gz && echo extracted"

      - name: Start app
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 dhayden@212.56.44.143 "
            cd ~/caclouky
            export Jwt__Key='${{ secrets.JWT_KEY }}'
            export Jwt__Issuer='http://212.56.44.143'
            export Jwt__Audience='http://212.56.44.143'
            export Ollama__BaseUrl='http://localhost:11434'
            export Ollama__Model='nomic-embed-text'
            export Ollama__ChatModel='llama3.2'
            export ASPNETCORE_URLS='http://0.0.0.0:8080'
            nohup dotnet CacloukyLibrary.dll > ~/caclouky/app.log 2>&1 &
            echo \$! > ~/caclouky/app.pid
            echo started PID \$(cat ~/caclouky/app.pid)
            sleep 10
            echo '--- app.log (t=10s) ---'
            cat ~/caclouky/app.log || true
            echo '--- process check (t=10s) ---'
            if ! kill -0 \$(cat ~/caclouky/app.pid) 2>/dev/null; then
              echo 'FATAL: app crashed on startup'; exit 1
            fi
            echo 'Process alive at t=10s — waiting 50s more for seeding...'
            sleep 50
            echo '--- app.log (t=60s) ---'
            cat ~/caclouky/app.log || true
            echo '--- final process check ---'
            if kill -0 \$(cat ~/caclouky/app.pid) 2>/dev/null; then
              echo 'Process still running'
              curl -sf http://localhost:8080 && echo 'localhost OK' || echo 'localhost not responding'
            else
              echo 'FATAL: app crashed after startup'; exit 1
            fi
          "
          echo '--- external connectivity check ---'
          curl -sf --max-time 10 http://212.56.44.143:8080 && echo 'EXTERNAL OK' || echo 'EXTERNAL UNREACHABLE'
