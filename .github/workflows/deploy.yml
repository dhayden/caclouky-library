name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Build Angular ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/caclouky-web/package-lock.json

      - name: Install Angular dependencies
        working-directory: web/caclouky-web
        run: npm ci

      - name: Build Angular (production)
        working-directory: web/caclouky-web
        run: npx ng build --configuration production

      # ── Copy Angular dist into API wwwroot ─────────────────────────────────
      - name: Copy Angular dist to API wwwroot
        run: |
          mkdir -p api/wwwroot
          cp -r web/caclouky-web/dist/caclouky-web/browser/. api/wwwroot/

      # ── Build & Publish .NET API ───────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish API (linux-x64)
        working-directory: api
        run: dotnet publish -c Release -r linux-x64 --self-contained false -o ../publish

      # ── Deploy to server ───────────────────────────────────────────────────
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 212.56.44.143 >> ~/.ssh/known_hosts

      - name: Stop running app
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 dhayden@212.56.44.143 \
            "if [ -f ~/caclouky/app.pid ]; then kill \$(cat ~/caclouky/app.pid) 2>/dev/null || true; rm ~/caclouky/app.pid; fi; echo stopped"

      - name: Copy files to server
        run: |
          chmod -R 755 publish/
          tar -czf deploy.tar.gz -C publish .
          scp -i ~/.ssh/deploy_key -P 2222 deploy.tar.gz dhayden@212.56.44.143:/home/dhayden/deploy.tar.gz
          ssh -i ~/.ssh/deploy_key -p 2222 dhayden@212.56.44.143 \
            "rm -rf ~/caclouky/* && tar -xzf ~/deploy.tar.gz --no-same-permissions -C ~/caclouky && rm ~/deploy.tar.gz && echo extracted"

      - name: Start app
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 dhayden@212.56.44.143 "
            cd ~/caclouky
            export JWT_KEY='${{ secrets.JWT_KEY }}'
            export JWT_ISSUER='https://caclouky.org'
            export JWT_AUDIENCE='https://caclouky.org'
            export ASPNETCORE_URLS='http://0.0.0.0:5000'
            nohup dotnet CacloukyLibrary.dll > ~/caclouky/app.log 2>&1 &
            echo \$! > ~/caclouky/app.pid
            echo started PID \$(cat ~/caclouky/app.pid)
          "

