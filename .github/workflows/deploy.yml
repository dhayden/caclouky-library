name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Build React ────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/caclouky-react/package-lock.json

      - name: Install React dependencies
        working-directory: web/caclouky-react
        run: npm ci

      - name: Build React (production)
        working-directory: web/caclouky-react
        run: npm run build
        env:
          VITE_API_URL: /api

      # ── Copy React dist into API wwwroot ───────────────────────────────────
      - name: Copy React dist to API wwwroot
        run: |
          mkdir -p api/wwwroot
          cp -r web/caclouky-react/dist/. api/wwwroot/

      # ── Build & Publish .NET API ───────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish API (linux-x64)
        working-directory: api
        run: dotnet publish -c Release -r linux-x64 --self-contained false -o ../publish

      # ── Deploy to server ───────────────────────────────────────────────────
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 212.56.44.143 >> ~/.ssh/known_hosts

      - name: Stop running app
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 dhayden@212.56.44.143 \
            "if [ -f ~/caclouky/app.pid ]; then kill \$(cat ~/caclouky/app.pid) 2>/dev/null || true; rm ~/caclouky/app.pid; fi; echo stopped"

      - name: Copy files to server
        run: |
          chmod -R 755 publish/
          tar -czf deploy.tar.gz -C publish .
          scp -i ~/.ssh/deploy_key -P 2222 deploy.tar.gz dhayden@212.56.44.143:/home/dhayden/deploy.tar.gz
          ssh -i ~/.ssh/deploy_key -p 2222 dhayden@212.56.44.143 \
            "find ~/caclouky -mindepth 1 -maxdepth 1 ! -name sermon-pdfs ! -name 'caclouky.db*' -exec rm -rf {} + && tar -xzf ~/deploy.tar.gz --no-same-permissions -C ~/caclouky && rm ~/deploy.tar.gz && echo extracted"

      - name: Start app
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 dhayden@212.56.44.143 "
            cd ~/caclouky
            export Jwt__Key='${{ secrets.JWT_KEY }}'
            export Jwt__Issuer='http://212.56.44.143'
            export Jwt__Audience='http://212.56.44.143'
            export Ollama__BaseUrl='http://localhost:11434'
            export Ollama__Model='nomic-embed-text'
            export Ollama__ChatModel='llama3.2'
            export ASPNETCORE_URLS='http://0.0.0.0:8080'
            nohup dotnet CacloukyLibrary.dll > ~/caclouky/app.log 2>&1 &
            echo \$! > ~/caclouky/app.pid
            echo started PID \$(cat ~/caclouky/app.pid)
          "
